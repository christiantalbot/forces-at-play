[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[functions."update-trends-background"]
  schedule = "@monthly"

[[headers]]
  for = "/.netlify/functions/trends-data"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/api/trends"
  to = "/.netlify/functions/trends-data"
  status = 200
